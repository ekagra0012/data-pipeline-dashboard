version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # bind-mount so CSV files persist
    environment:
      - DATA_DIR=/app/data/processed
      - FRONTEND_DIR=/app/frontend/dist
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - VITE_API_BASE=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
